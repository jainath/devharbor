name: Bug report
description: Something isn't working as expected in DevHarbor
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I click Start on a multi-task app, …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Add an app at …
        2. …
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DevHarbor version
      description: See DevHarbor menu → About DevHarbor.
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version & chip
      placeholder: macOS 14.5 · Apple Silicon (M2)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste any error text from the app's log pane or a screenshot. (Scrub secrets from `.env` output.)
    validations:
      required: false
